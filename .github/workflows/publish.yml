name: Build and Publish Cross-Platform Wheels

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      windows-smoke-run-id:
        description: "Run ID containing dist-windows-latest to smoke test on Windows"
        required: false
        default: ""

jobs:
  build:
    name: Build wheels on ${{ matrix.os }}
    if: inputs.windows-smoke-run-id == ''
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Cache MuPDF Headers
        id: cache-headers
        uses: actions/cache@v4
        with:
          path: mupdf/include
          key: mupdf-headers-1.27.0

      - name: Sparse clone MuPDF headers
        if: steps.cache-headers.outputs.cache-hit != 'true'
        shell: bash
        run: |
          rm -rf mupdf
          git clone --filter=blob:none --sparse --depth 1 --branch 1.27.0 https://github.com/ArtifexSoftware/mupdf.git mupdf
          cd mupdf
          git sparse-checkout set include
          cd ..

      - uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache-dependency-path: go/go.sum

      - name: Download MuPDF Windows runtime
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force lib/mupdf | Out-Null
          Invoke-WebRequest `
            -Uri "https://github.com/intercepted16/mupdf-prebuilts/releases/download/mupdf-1.27.0/libmupdf.dll" `
            -OutFile "lib/mupdf/libmupdf.dll"
          Invoke-WebRequest `
            -Uri "https://github.com/intercepted16/mupdf-prebuilts/releases/download/mupdf-1.27.0/libmupdf.dll.a" `
            -OutFile "lib/mupdf/libmupdf.dll.a"
          Invoke-WebRequest `
            -Uri "https://github.com/intercepted16/mupdf-prebuilts/releases/download/mupdf-1.27.0/libgcc_s_seh-1.dll" `
            -OutFile "lib/mupdf/libgcc_s_seh-1.dll"
          Invoke-WebRequest `
            -Uri "https://github.com/intercepted16/mupdf-prebuilts/releases/download/mupdf-1.27.0/libwinpthread-1.dll" `
            -OutFile "lib/mupdf/libwinpthread-1.dll"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build wheels
        env:
          MACOSX_DEPLOYMENT_TARGET: 15.0
        run: |
          uvx cibuildwheel==3.3.0 --output-dir dist

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.os }}
          path: dist/*.whl

  windows-smoke:
    name: Smoke test Windows wheel
    if: inputs.windows-smoke-run-id != ''
    runs-on: windows-latest
    permissions:
      actions: read
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Download Windows wheel artifact
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh run download "${{ inputs.windows-smoke-run-id }}" `
            --repo "${{ github.repository }}" `
            --name dist-windows-latest `
            --dir dist

      - name: Install Windows wheel
        shell: pwsh
        run: |
          $wheel = Get-ChildItem dist -Filter "*cp311*win_amd64.whl" | Select-Object -First 1
          if (-not $wheel) {
            throw "No cp311 win_amd64 wheel found in dist"
          }
          python -m pip install --upgrade pip
          python -m pip install $wheel.FullName

      - name: Run to_json smoke test
        shell: pwsh
        run: python test.py

  publish:
    needs: build
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: dist-*
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" dist/* \
            --repo "${{ github.repository }}" \
            --notes "Release ${{ github.ref_name }}"
